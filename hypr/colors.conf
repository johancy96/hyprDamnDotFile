$primary = rgba(79ddebff)
$secondary = rgba(a8cdd3ff)
$tertiary = rgba(ffc199ff)
$surface = rgba(0f1415ff)
$error = rgba(ffb4abff)

# Gradiente de pulso de alto contraste (Llama intensa)
# Alterna entre el color primario y el de superficie para que el "apagado" se note de verdad
$fire_pulse = $primary $surface $primary $surface $primary 45deg
$fire_glow = $primary
